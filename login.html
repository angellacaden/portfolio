<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | My Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="css/login.css">
</head>

<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <div class="bg-layer">
    <div class="bg-gradient"></div>
    <div class="bg-lines"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <section class="login-section">

    <!-- Brand -->
    <div class="login-brand">
      <div class="logo-text">My<span>Portfolio</span></div>
      <div class="brand-divider">
        <h2>Welcome back</h2>
      </div>
    </div>

    <!-- Form -->
    <form id="loginForm" novalidate>

      <div class="field">
        <label for="email">Email Address</label>
        <div class="input-wrap">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="3" width="14" height="10" rx="1.5" stroke="#c9a84c" stroke-width="1.2" />
            <path d="M1 6l7 4.5L15 6" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round" />
          </svg>
          <input type="email" id="email" required placeholder="your@email.com" autocomplete="email">
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="7" width="10" height="8" rx="1.5" stroke="#c9a84c" stroke-width="1.2" />
            <path d="M5 7V5a3 3 0 0 1 6 0v2" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round" />
            <circle cx="8" cy="11" r="1" fill="#c9a84c" />
          </svg>
          <input type="password" id="password" required placeholder="Enter your password"
            autocomplete="current-password">
          <button type="button" class="eye-toggle" id="eyeToggle" aria-label="Toggle password">
            <svg id="eyeIcon" width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.2" />
              <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.2" />
            </svg>
          </button>
        </div>
      </div>

      <div class="terms-row">
        <input type="checkbox" id="terms">
        <label for="terms">I accept the <a href="#">Terms</a> and <a href="#">Privacy Policy</a></label>
      </div>

      <button type="submit" class="btn-login"><span>Login</span></button>
    </form>

    <div class="or-divider"><span>or</span></div>

    <button id="googleBtn" class="btn-google">
      <img src="logo.jpg" alt="Google" class="google-icon">
      <div class="g-fallback hidden">G</div>
      Continue with Google
    </button>

    <p class="register-link">Don't have an account? <a href="register.html">Register here</a></p>

  </section>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/login.js"></script>

</body>

</html>
