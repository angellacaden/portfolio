<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | My Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f5f0e8;
      --ink: #1a1208;
      --gold: #c9a84c;
      --gold-light: #e8d49a;
      --rust: #b85c2c;
      --warm-gray: #8c8078;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--ink);
      color: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      cursor: default;
    }

    /* ── Noise Overlay ── */
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 1000; opacity: .4;
    }

    /* ── Background ── */
    .bg-layer { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
    .bg-gradient {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 10% 20%, rgba(201,168,76,.1) 0%, transparent 60%),
        radial-gradient(ellipse 50% 70% at 90% 80%, rgba(184,92,44,.07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 60% 40%, rgba(74,103,65,.05) 0%, transparent 70%);
    }
    .bg-lines {
      position: absolute; inset: 0;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 80px, rgba(201,168,76,.03) 80px, rgba(201,168,76,.03) 81px);
    }
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); animation: drift 20s ease-in-out infinite alternate; }
    .orb-1 { width: 500px; height: 500px; background: rgba(201,168,76,.07); top: -100px; left: -100px; animation-duration: 25s; }
    .orb-2 { width: 400px; height: 400px; background: rgba(184,92,44,.06); bottom: -80px; right: -80px; animation-duration: 18s; animation-delay: -8s; }
    .orb-3 { width: 300px; height: 300px; background: rgba(74,103,65,.05); top: 40%; left: 60%; animation-duration: 22s; animation-delay: -4s; }

    @keyframes drift {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(40px,-30px) scale(1.05); }
      66%  { transform: translate(-20px,50px) scale(.95); }
      100% { transform: translate(30px,20px) scale(1.02); }
    }

    /* ── Register Card ── */
    .register-section {
      position: relative; z-index: 10;
      width: 100%; max-width: 480px;
      margin: 40px 20px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(201,168,76,.15);
      padding: 56px 52px;
      animation: fadeUp 1s cubic-bezier(.16,1,.3,1) .2s both;
    }

    /* gold top bar */
    .register-section::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    @keyframes fadeUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* ── Brand ── */
    .register-brand {
      text-align: center;
      margin-bottom: 44px;
    }
    .register-brand .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; font-weight: 900;
      letter-spacing: -.02em; color: var(--cream);
    }
    .register-brand .logo-text span { color: var(--gold); }
    .register-brand .brand-divider {
      display: flex; align-items: center; gap: 14px;
      margin-top: 20px;
    }
    .register-brand .brand-divider::before,
    .register-brand .brand-divider::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(201,168,76,.2);
    }
    .register-brand h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; font-weight: 400; font-style: italic;
      color: var(--warm-gray); white-space: nowrap;
    }

    /* ── Form Fields ── */
    .field { margin-bottom: 22px; }
    .field label {
      display: block;
      font-size: .68rem; letter-spacing: .2em; text-transform: uppercase;
      color: var(--gold); font-weight: 500;
      margin-bottom: 10px;
    }
    .input-wrap { position: relative; }
    .input-wrap svg {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      transition: opacity .3s;
      opacity: .5;
    }
    .input-wrap:focus-within svg { opacity: 1; }

    .field input[type="text"],
    .field input[type="email"],
    .field input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(201,168,76,.18);
      padding: 14px 18px 14px 48px;
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem; font-weight: 300;
      outline: none;
      transition: border-color .3s, background .3s;
      cursor: default;
    }
    .field input::placeholder { color: rgba(140,128,120,.5); }
    .field input:focus {
      border-color: rgba(201,168,76,.5);
      background: rgba(201,168,76,.04);
    }

    /* password strength bar */
    .strength-bar {
      display: flex; gap: 4px; margin-top: 8px;
    }
    .strength-seg {
      flex: 1; height: 3px;
      background: rgba(201,168,76,.12);
      transition: background .4s;
    }
    .strength-seg.active-weak   { background: #b85c2c; }
    .strength-seg.active-fair   { background: #c9a84c; }
    .strength-seg.active-strong { background: #7aad74; }
    .strength-label {
      font-size: .65rem; letter-spacing: .1em; text-transform: uppercase;
      color: var(--warm-gray); margin-top: 6px; min-height: 14px;
      transition: color .3s;
    }

    /* password toggle */
    .eye-toggle {
      position: absolute; right: 16px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--warm-gray); cursor: default;
      padding: 4px; opacity: .5;
      transition: opacity .3s;
    }
    .eye-toggle:hover { opacity: 1; }

    /* ── Terms ── */
    .terms-row {
      display: flex; align-items: flex-start; gap: 12px;
      margin-bottom: 32px;
    }
    .terms-row input[type="checkbox"] {
      appearance: none; -webkit-appearance: none;
      width: 18px; height: 18px; flex-shrink: 0;
      border: 1px solid rgba(201,168,76,.35);
      background: transparent;
      position: relative; cursor: default;
      margin-top: 1px;
      transition: border-color .3s, background .3s;
    }
    .terms-row input[type="checkbox"]:checked {
      background: var(--gold);
      border-color: var(--gold);
    }
    .terms-row input[type="checkbox"]:checked::after {
      content: '';
      position: absolute; top: 3px; left: 5px;
      width: 5px; height: 9px;
      border: 2px solid var(--ink);
      border-top: none; border-left: none;
      transform: rotate(45deg);
    }
    .terms-row label {
      font-size: .8rem; color: var(--warm-gray);
      font-weight: 300; line-height: 1.5; cursor: default;
    }
    .terms-row label a {
      color: var(--gold-light); text-decoration: none;
      border-bottom: 1px solid rgba(201,168,76,.3);
      transition: border-color .3s;
    }
    .terms-row label a:hover { border-color: var(--gold); }

    /* ── Submit Button ── */
    .btn-register {
      width: 100%;
      padding: 16px;
      background: var(--gold);
      color: var(--ink);
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: .8rem; font-weight: 600;
      letter-spacing: .15em; text-transform: uppercase;
      cursor: default;
      position: relative; overflow: hidden;
      transition: color .4s;
      margin-bottom: 16px;
    }
    .btn-register::before {
      content: ''; position: absolute; inset: 0;
      background: var(--ink);
      transform: translateX(-101%);
      transition: transform .4s cubic-bezier(.16,1,.3,1);
    }
    .btn-register:hover { color: var(--gold); }
    .btn-register:hover::before { transform: translateX(0); }
    .btn-register span { position: relative; z-index: 1; }

    /* loading state */
    .btn-register.loading span { opacity: 0; }
    .btn-register.loading::after {
      content: '';
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 18px; height: 18px;
      border: 2px solid rgba(26,18,8,.3);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

    /* ── Divider ── */
    .or-divider {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 16px;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(201,168,76,.15);
    }
    .or-divider span {
      font-size: .65rem; letter-spacing: .2em; text-transform: uppercase;
      color: var(--warm-gray); font-weight: 500;
    }

    /* ── Google Button ── */
    .btn-google {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid rgba(201,168,76,.2);
      color: var(--warm-gray);
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem; font-weight: 400;
      cursor: default;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      transition: border-color .3s, color .3s, background .3s;
      margin-bottom: 32px;
    }
    .btn-google:hover {
      border-color: rgba(201,168,76,.4);
      color: var(--cream);
      background: rgba(201,168,76,.05);
    }
    .google-icon {
      width: 18px; height: 18px;
      object-fit: contain; border-radius: 50%;
    }
    .g-fallback {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #4285f4;
      color: #fff;
      font-size: .7rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* ── Login Link ── */
    .login-link {
      text-align: center;
      font-size: .8rem; color: var(--warm-gray); font-weight: 300;
    }
    .login-link a {
      color: var(--gold-light); text-decoration: none;
      border-bottom: 1px solid rgba(201,168,76,.3);
      transition: color .3s, border-color .3s;
    }
    .login-link a:hover { color: var(--gold); border-color: var(--gold); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(26,18,8,.95);
      border: 1px solid rgba(201,168,76,.25);
      padding: 14px 28px;
      font-size: .82rem; color: var(--cream);
      white-space: nowrap;
      opacity: 0; pointer-events: none;
      transition: opacity .35s, transform .35s;
      z-index: 5000;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: rgba(184,92,44,.5); color: #e8a87a; }
    .toast.success { border-color: rgba(74,103,65,.5); color: #a8c4a4; }

    @media (max-width: 540px) {
      .register-section { padding: 40px 28px; }
    }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div class="bg-layer">
  <div class="bg-gradient"></div>
  <div class="bg-lines"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<section class="register-section">

  <!-- Brand -->
  <div class="register-brand">
    <div class="logo-text">My<span>Portfolio</span></div>
    <div class="brand-divider">
      <h2>Create an account</h2>
    </div>
  </div>

  <!-- Form -->
  <form id="registerForm" novalidate>

    <!-- Name -->
    <div class="field">
      <label for="name">Full Name</label>
      <div class="input-wrap">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="5" r="3" stroke="#c9a84c" stroke-width="1.2"/>
          <path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        <input type="text" id="name" required placeholder="Your full name" autocomplete="name">
      </div>
    </div>

    <!-- Email -->
    <div class="field">
      <label for="email">Email Address</label>
      <div class="input-wrap">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="3" width="14" height="10" rx="1.5" stroke="#c9a84c" stroke-width="1.2"/>
          <path d="M1 6l7 4.5L15 6" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        <input type="email" id="email" required placeholder="your@email.com" autocomplete="email">
      </div>
    </div>

    <!-- Password -->
    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="3" y="7" width="10" height="8" rx="1.5" stroke="#c9a84c" stroke-width="1.2"/>
          <path d="M5 7V5a3 3 0 0 1 6 0v2" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round"/>
          <circle cx="8" cy="11" r="1" fill="#c9a84c"/>
        </svg>
        <input type="password" id="password" required placeholder="Create a password" autocomplete="new-password">
        <button type="button" class="eye-toggle" id="eyeToggle" aria-label="Toggle password">
          <svg id="eyeIcon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.2"/>
            <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.2"/>
          </svg>
        </button>
      </div>
      <!-- Strength bar -->
      <div class="strength-bar">
        <div class="strength-seg" id="seg1"></div>
        <div class="strength-seg" id="seg2"></div>
        <div class="strength-seg" id="seg3"></div>
        <div class="strength-seg" id="seg4"></div>
      </div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>

    <!-- Terms -->
    <div class="terms-row">
      <input type="checkbox" id="terms">
      <label for="terms">I accept the <a href="#">Terms</a> and <a href="#">Privacy Policy</a></label>
    </div>

    <button type="submit" class="btn-register"><span>Create Account</span></button>
  </form>

  <p class="login-link">Already have an account? <a href="login.html">Login here</a></p>

</section>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>

  // ── Toast ──
  const toast = document.getElementById('toast');
  let toastTimer;
  function showToast(msg, type='error') {
    toast.textContent = msg;
    toast.className = 'toast ' + type;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=> toast.classList.remove('show'), 3000);
  }

  // ── Password Toggle ──
  const eyeToggle = document.getElementById('eyeToggle');
  const pwInput   = document.getElementById('password');
  const eyeIcon   = document.getElementById('eyeIcon');
  const eyeOpen  = `<path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.2"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.2"/>`;
  const eyeClose = `<path d="M1 1l14 14M6.5 6.6A2 2 0 0 0 8 10a2 2 0 0 0 1.5-.6M4 4.3C2.3 5.5 1 8 1 8s2.5 5 7 5a7 7 0 0 0 3-.7M8 3c4.5 0 7 5 7 5a12 12 0 0 1-1.8 2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>`;
  eyeToggle.addEventListener('click', ()=>{
    const shown = pwInput.type === 'text';
    pwInput.type = shown ? 'password' : 'text';
    eyeIcon.innerHTML = shown ? eyeOpen : eyeClose;
  });

  // ── Password Strength ──
  const segs  = [document.getElementById('seg1'),document.getElementById('seg2'),document.getElementById('seg3'),document.getElementById('seg4')];
  const label = document.getElementById('strengthLabel');
  pwInput.addEventListener('input', ()=>{
    const val = pwInput.value;
    let score = 0;
    if (val.length >= 8)  score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const cls = score <= 1 ? 'active-weak' : score <= 2 ? 'active-fair' : 'active-strong';
    const lbl = score === 0 ? '' : score <= 1 ? 'Weak' : score <= 2 ? 'Fair' : score === 3 ? 'Good' : 'Strong';
    const col = score <= 1 ? '#b85c2c' : score <= 2 ? '#c9a84c' : '#7aad74';

    segs.forEach((s,i)=>{
      s.className = 'strength-seg';
      if (i < score) s.classList.add(cls);
    });
    label.textContent = lbl;
    label.style.color = col;
  });

  // ── Register Form ──
  document.getElementById('registerForm').addEventListener('submit', function(e){
    e.preventDefault();
    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const terms    = document.getElementById('terms').checked;
    const btn      = document.querySelector('.btn-register');

    if (!terms)    { showToast('Please accept Terms and Privacy Policy'); return; }
    if (!name || !email || !password) { showToast('Please fill in all fields'); return; }
    if (password.length < 6) { showToast('Password must be at least 6 characters'); return; }

    btn.classList.add('loading');

    setTimeout(()=>{
      btn.classList.remove('loading');
      const users = JSON.parse(localStorage.getItem("users")) || [];

      if (users.find(u => u.email === email)) {
        showToast('Email is already registered!');
        return;
      }

      users.push({ name, email, password });
      localStorage.setItem("users", JSON.stringify(users));

      showToast('Account created! Redirecting to login…', 'success');
      setTimeout(()=> window.location.href = "login.html", 1400);
    }, 800);
  });


</script>

</body>
</html>
